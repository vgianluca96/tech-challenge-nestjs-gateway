# docker-compose.yml
version: '3.8'

services:
  # NestJS Gateway Application
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - MONGODB_URI=mongodb://mongo:27017/gateway_db
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - AUTH_SERVICE_URL=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      # For development - mount source code for hot reload
      - .:/app
      - /app/node_modules
    networks:
      - gateway-network

  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: gateway-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=gateway_db
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - gateway-network

  # MongoDB Admin Interface (optional)
  mongo-express:
    image: mongo-express:latest
    container_name: gateway-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - gateway-network

volumes:
  mongo_data:

networks:
  gateway-network:
    driver: bridge